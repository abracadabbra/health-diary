name: health_diary
description: 养生日记 - 记录每日健康生活
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  table_calendar: ^3.0.9
  fl_chart: ^0.66.0
  uuid: ^4.3.3
  # 提醒功能
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  # 云端同步
  http: ^1.2.0
  dio: ^5.4.0
  # UI 优化
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
